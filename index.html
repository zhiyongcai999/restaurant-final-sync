<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐馆云端老板系统 Pro</title>
<style>
body{margin:0;background:#f3f5f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#111}
.app{max-width:720px;margin:0 auto;padding-bottom:78px}
.header{background:linear-gradient(135deg,#111827,#273449);color:#fff;padding:18px;border-bottom-left-radius:24px;border-bottom-right-radius:24px}
.header h1{margin:0 0 6px;font-size:22px}.header p{margin:0;color:#d1d5db;font-size:13px}
.card{background:#fff;border-radius:18px;margin:12px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:#eef4ff;border-radius:15px;padding:12px}.stat b{display:block;font-size:12px;color:#555;margin-bottom:7px}.stat span{font-size:20px;font-weight:800}
.good{background:#e8f7ee}.bad{background:#ffe8e8}.warn{background:#fff6dc}
label{display:block;font-size:13px;color:#555;margin:8px 0 4px}
input,select{width:100%;border:1px solid #e5e7eb;border-radius:12px;padding:12px;font-size:16px;box-sizing:border-box}
button{width:100%;border:0;border-radius:14px;background:#111827;color:white;padding:13px 16px;font-size:16px;font-weight:700;margin-top:10px}
button.light{background:#eef2ff;color:#111827}
.page{display:none}.page.active{display:block}
.bottom{position:fixed;bottom:0;left:0;right:0;max-width:720px;margin:0 auto;height:68px;background:#fff;border-top:1px solid #e5e7eb;display:grid;grid-template-columns:repeat(5,1fr)}
.nav{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:#6b7280;gap:3px}.nav.active{font-weight:800;color:#111827}.icon{font-size:20px}
.status{font-size:13px;border-radius:12px;padding:10px;white-space:pre-wrap}.ok{background:#e8f7ee;color:#087d2b}.err{background:#ffe8e8;color:#991b1b}
.table{width:100%;border-collapse:collapse;font-size:12px}.table th,.table td{border-bottom:1px solid #eee;padding:8px;text-align:left;white-space:nowrap}.table-wrap{max-height:420px;overflow:auto}
</style>
</head>
<body>
<div class="app">
<div class="header"><h1>餐馆云端老板系统 Pro</h1><p>强制云同步版 · 手机电脑必须一致</p></div>

<section id="dashboard" class="page active">
  <div class="card">
    <h3>云端状态</h3>
    <div id="cloudStatus" class="status warn">正在连接云端...</div>
    <button class="light" onclick="loadCloud(true)">手动从云端刷新</button>
  </div>
  <div class="card"><label>查看日期</label><input type="date" id="viewDate" onchange="renderAll()"></div>
  <div class="card">
    <h3>今日核心</h3>
    <div class="row">
      <div class="stat"><b>营业额</b><span id="dayRevenue">$0.00</span></div>
      <div class="stat" id="dayProfitBox"><b>净利润</b><span id="dayProfit">$0.00</span></div>
      <div class="stat"><b>总支出</b><span id="dayExpense">$0.00</span></div>
      <div class="stat"><b>现金净流入</b><span id="cashNet">$0.00</span></div>
      <div class="stat"><b>总单数</b><span id="dayOrders">0</span></div>
      <div class="stat"><b>平均客单价</b><span id="avgOrder">$0.00</span></div>
    </div>
  </div>
  <div class="card">
    <h3>收入拆分</h3>
    <div class="row3">
      <div class="stat"><b>现金</b><span id="dayCash">$0.00</span></div>
      <div class="stat"><b>刷卡</b><span id="dayCard">$0.00</span></div>
      <div class="stat"><b>扫码</b><span id="dayScan">$0.00</span></div>
      <div class="stat"><b>Uber</b><span id="dayUber">$0.00</span></div>
      <div class="stat"><b>DoorDash</b><span id="dayDoorDash">$0.00</span></div>
      <div class="stat"><b>熊猫</b><span id="dayPanda">$0.00</span></div>
    </div>
  </div>
</section>

<section id="incomePage" class="page">
  <div class="card"><h3>收入录入</h3>
    <label>日期</label><input type="date" id="incomeDate">
    <label>现金</label><input type="number" id="cash" placeholder="0">
    <label>刷卡</label><input type="number" id="card" placeholder="0">
    <label>扫码点餐/扫码付款</label><input type="number" id="scanPay" placeholder="0">
    <label>Uber</label><input type="number" id="uber" placeholder="0">
    <label>DoorDash</label><input type="number" id="doordash" placeholder="0">
    <label>熊猫</label><input type="number" id="panda" placeholder="0">
    <div class="row"><div><label>堂吃单数</label><input type="number" id="dineinOrders"></div><div><label>外卖单数</label><input type="number" id="deliveryOrders"></div></div>
    <label>备注</label><input id="incomeNote">
    <button onclick="saveIncome()">保存收入到云端</button>
  </div>
</section>

<section id="expensePage" class="page">
  <div class="card"><h3>支出录入</h3>
    <label>日期</label><input type="date" id="expenseDate">
    <label>大类</label><select id="expenseType"><option>采购</option><option>租金/固定</option><option>维修</option><option>平台费用</option><option>其他</option></select>
    <label>名称</label><input id="expenseName">
    <label>金额</label><input type="number" id="expenseAmount">
    <label>支付方式</label><select id="expensePay"><option>现金</option><option>转账</option><option>刷卡</option><option>扫码</option></select>
    <label>备注</label><input id="expenseNote">
    <button onclick="saveExpense()">保存支出到云端</button>
  </div>
</section>

<section id="wagePage" class="page">
  <div class="card"><h3>工资录入</h3>
    <label>日期</label><input type="date" id="wageDate">
    <label>员工</label><input id="employee">
    <label>岗位</label><input id="role">
    <div class="row"><div><label>小时</label><input type="number" id="hours"></div><div><label>时薪</label><input type="number" id="rate"></div></div>
    <label>金额</label><input type="number" id="wageAmount">
    <button class="light" onclick="wageAmount.value=((+hours.value||0)*(+rate.value||0)).toFixed(2)">小时×时薪</button>
    <button onclick="saveWage()">保存工资到云端</button>
  </div>
</section>

<section id="historyPage" class="page">
  <div class="card"><h3>历史</h3><button class="light" onclick="loadCloud(true)">从云端刷新历史</button></div>
  <div class="card"><h3>收入历史</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>现金</th><th>刷卡</th><th>扫码</th><th>总额</th></tr></thead><tbody id="incomeTable"></tbody></table></div></div>
  <div class="card"><h3>支出历史</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>类型</th><th>名称</th><th>金额</th></tr></thead><tbody id="expenseTable"></tbody></table></div></div>
  <div class="card"><h3>工资历史</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>员工</th><th>金额</th></tr></thead><tbody id="wageTable"></tbody></table></div></div>
</section>

<div class="bottom">
<div class="nav active" onclick="go('dashboard',this)"><div class="icon">📊</div>看板</div>
<div class="nav" onclick="go('incomePage',this)"><div class="icon">💰</div>收入</div>
<div class="nav" onclick="go('expensePage',this)"><div class="icon">🧾</div>支出</div>
<div class="nav" onclick="go('wagePage',this)"><div class="icon">👥</div>工资</div>
<div class="nav" onclick="go('historyPage',this)"><div class="icon">📋</div>历史</div>
</div>
</div>
<script src="app.js?v=cloud-debug-2"></script>
</body>
</html>
